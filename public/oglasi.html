<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oglasi — Oglasnik.ba</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .search-bar { 
            display: flex; 
            gap: 10px;
            padding: 30px 60px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }
        .search-bar input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        .search-bar input:focus {
            border-color: #3C3489;
        }
        .filters {
            display: flex;
            gap: 10px;
            padding: 16px 60px;
            background: #f7f7f9;
            border-bottom: 1px solid #e5e7eb;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 6px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            color: #6b7280;
        }
        .filter-btn.active {
            background: #3C3489;
            color: white;
            border-color: #3C3489;
        }
        .rezultati-info {
            padding: 16px 60px;
            font-size: 14px;
            color: #6b7280;
            <div id="ai-analiza-box" style="display:none; margin: 0 60px 20px; background: #EEEDFE; border-radius: 12px; padding: 20px; border-left: 4px solid #3C3489;">
    <div style="font-weight: 600; color: #3C3489; margin-bottom: 10px;">AI Analiza</div>
    <div id="ai-analiza-tekst" style="font-size: 14px; color: #26215C; line-height: 1.7; white-space: pre-wrap;"></div>
</div>
        }
        .oglasi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px 60px 60px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .oglas-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .oglas-card:hover {
            transform: translateY(-2px);
            border-color: #3C3489;
        }
        .oglas-slika {
            width: 100%;
            height: 180px;
            background: #f7f7f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .oglas-body {
            padding: 14px;
        }
        .oglas-naslov {
            font-size: 14px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .oglas-cijena {
            font-size: 18px;
            font-weight: 700;
            color: #3C3489;
            margin-bottom: 8px;
        }
        .oglas-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .oglas-lokacija {
            font-size: 12px;
            color: #6b7280;
        }
        .oglas-platforma {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }
        .platforma-olx { background: #EEEDFE; color: #3C3489; }
        .platforma-njuskalo { background: #FAECE7; color: #712B13; }
        .platforma-facebook { background: #E6F1FB; color: #0C447C; }
        .ai-score {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #f3f4f6;
        }
        .score-bar-wrap {
            flex: 1;
            height: 4px;
            background: #f3f4f6;
            border-radius: 2px;
        }
        .score-bar-fill {
            height: 4px;
            border-radius: 2px;
        }
        .score-label {
            font-size: 11px;
            font-weight: 600;
        }
        .ai-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 500;
        }
        .ai-good { background: #EAF3DE; color: #27500A; }
        .ai-warn { background: #FAEEDA; color: #633806; }
        .ai-bad { background: #FCEBEB; color: #791F1F; }
        .loader {
            text-align: center;
            padding: 60px;
            color: #6b7280;
            font-size: 16px;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">🔍 Oglasnik.ba</div>
    <div style="display:flex; gap:12px; align-items:center;">
        <a href="/" style="color:#6b7280; text-decoration:none; font-size:14px;">Naslovna</a>
        <button class="btn-primary">Moj profil</button>
    </div>
</nav>

<div class="search-bar">
    <input type="text" id="searchInput" placeholder="Pretraži sve oglase u BiH... npr. iPhone 15, Golf 6, sofa..." />
    <button class="btn-primary" onclick="pretrazi()">Pretraži</button>
    <div class="search-bar">
    <input type="text" id="searchInput" ... />
    <button class="btn-primary" onclick="pretrazi()">Pretraži</button>
    <button class="btn-primary" onclick="aiAnaliza()" style="white-space:nowrap; background:#534AB7;">AI Analiza</button>
</div>
</div>

<div class="filters">
    <span style="font-size:13px; color:#6b7280; align-self:center;">Platforma:</span>
    <button class="filter-btn active" onclick="filterPlatforma(this, 'sve')">Sve</button>
    <button class="filter-btn" onclick="filterPlatforma(this, 'olx')">OLX</button>
    <button class="filter-btn" onclick="filterPlatforma(this, 'njuskalo')">Njuškalo</button>
    <button class="filter-btn" onclick="filterPlatforma(this, 'facebook')">Facebook</button>
    
    <span style="font-size:13px; color:#6b7280; align-self:center; margin-left:16px;">Sortiraj:</span>
    <button class="filter-btn active" onclick="sortiraj(this, 'novo')">Najnovije</button>
    <button class="filter-btn" onclick="sortiraj(this, 'cijena_asc')">Cijena ↑</button>
    <button class="filter-btn" onclick="sortiraj(this, 'cijena_desc')">Cijena ↓</button>
    <button class="filter-btn" onclick="sortiraj(this, 'score')">AI Score ↓</button>
</div>

<div class="rezultati-info" id="rezultatiInfo">Učitavam oglase...</div>

<div class="oglasi-grid" id="oglasiGrid">
    <div class="loader">⏳ Učitavam oglase...</div>
</div>

<script src="oglasi.js"></script>
<script>
async function aiAnaliza() {
    var box = document.getElementById('ai-analiza-box');
    var tekst = document.getElementById('ai-analiza-tekst');
    var query = document.getElementById('searchInput').value.trim();
    box.style.display = 'block';
    tekst.textContent = 'AI analizira oglase...';
    var res = await fetch('/ai-analiza', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ oglasi: demoOglasi.slice(0, 5), pretraga: query || 'vozila' })
    });
    var data = await res.json();
    if (data.uspjeh) {
        tekst.textContent = data.analiza;
    } else {
        tekst.textContent = 'Greska pri analizi. Pokusaj ponovo.';
    }
}
</script>
</body>
</html>
