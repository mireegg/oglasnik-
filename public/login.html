<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prijava — Oglix</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #e65c00;
    --orange-light: #ff7a1f;
    --orange-dim: #fff0e6;
    --bg: #f7f5f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --text: #1a1a1a;
    --text-muted: #777;
    --text-faint: #aaa;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --radius-pill: 100px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    cursor: pointer;
  }
  .logo span { color: var(--orange); }

  .nav-back {
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
    text-decoration: none;
  }
  .nav-back:hover { color: var(--text); }

  .auth-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 40px;
    width: 100%;
    max-width: 420px;
  }

  .auth-logo {
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .auth-logo span { color: var(--orange); }

  .auth-sub {
    text-align: center;
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 28px;
    font-weight: 300;
  }

  .tabs {
    display: flex;
    background: var(--bg);
    border-radius: var(--radius-md);
    padding: 4px;
    margin-bottom: 28px;
    gap: 4px;
  }

  .tab-btn {
    flex: 1;
    padding: 9px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    border: none;
    background: transparent;
  }

  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
  }

  .form-group input:focus {
    border-color: var(--orange);
    background: var(--surface);
  }

  .auth-btn {
    width: 100%;
    padding: 13px;
    background: var(--orange);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-size: 15px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s;
  }
  .auth-btn:hover { background: var(--orange-light); }

  .auth-poruka {
    margin-top: 12px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    min-height: 20px;
  }

  .auth-footer {
    text-align: center;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-faint);
  }

  footer {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 20px 32px;
    text-align: center;
    font-size: 13px;
    color: var(--text-faint);
  }

  .footer-logo {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .footer-logo span { color: var(--orange); }
  .spinner {
    display: inline-block;
    width: 13px;
    height: 13px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.auth-btn:disabled {
    opacity: 0.65;
    cursor: not-allowed;
}

.s-bar {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: var(--border);
    transition: background 0.2s;
}
.s-bar.weak   { background: #dc2626; }
.s-bar.medium { background: #f59e0b; }
.s-bar.strong { background: #16a34a; }

.s-hint {
    font-size: 11px;
    margin-top: 4px;
    color: var(--text-faint);
}

.strength {
    display: flex;
    gap: 4px;
    margin-top: 6px;
}

.input-wrap {
    position: relative;
}
.input-wrap input {
    width: 100%;
    padding: 12px 38px 12px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
}
.input-wrap input:focus {
    border-color: var(--orange);
    background: var(--surface);
}

.eye {
    position: absolute;
    right: 11px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 14px;
    user-select: none;
    line-height: 1;
}

.forgot {
    text-align: right;
    margin-top: 5px;
}
.forgot a {
    font-size: 12px;
    color: var(--text-faint);
    text-decoration: none;
}
.forgot a:hover { color: var(--orange); }
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="window.location.href='/oglasi.html'">oglix<span>.ba</span></div>
  <a class="nav-back" href="/oglasi.html">← Nazad na pretragu</a>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">oglix<span>.ba</span></div>
    <div class="auth-sub">Prijavi se i prati oglase koje voliš</div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login', this)">Prijava</button>
      <button class="tab-btn" onclick="switchTab('register', this)">Registracija</button>
    </div>

    <div id="loginForma">
  <div class="form-group">
    <label>Email adresa</label>
    <div class="input-wrap">
      <input type="email" id="loginEmail" placeholder="tvoj@email.com" />
    </div>
  </div>
  <div class="form-group">
    <label>Lozinka</label>
    <div class="input-wrap">
      <input type="password" id="loginLozinka" placeholder="••••••••" />
      <span class="eye" onclick="togglePass('loginLozinka', this)">👁</span>
    </div>
    <div class="forgot"><a href="#">Zaboravljena lozinka?</a></div>
  </div>
  <button class="auth-btn" id="loginBtn" onclick="login()">Prijavi se</button>
  <div class="auth-poruka" id="loginPoruka"></div>
</div>

    <div id="registerForma" style="display:none;">
  <div class="form-group">
    <label>Ime i prezime</label>
    <div class="input-wrap">
      <input type="text" id="regIme" placeholder="Npr. Mirza Čakanović" />
    </div>
  </div>
  <div class="form-group">
    <label>Email adresa</label>
    <div class="input-wrap">
      <input type="email" id="regEmail" placeholder="tvoj@email.com" />
    </div>
  </div>
  <div class="form-group">
    <label>Lozinka</label>
    <div class="input-wrap">
      <input type="password" id="regLozinka" placeholder="Minimum 6 karaktera"
             oninput="checkStrength(this.value)" />
      <span class="eye" onclick="togglePass('regLozinka', this)">👁</span>
    </div>
    <div class="strength">
      <div class="s-bar" id="s1"></div>
      <div class="s-bar" id="s2"></div>
      <div class="s-bar" id="s3"></div>
    </div>
    <div class="s-hint" id="sHint"></div>
  </div>
  <button class="auth-btn" id="regBtn" onclick="register()">Napravi account</button>
  <div class="auth-poruka" id="registerPoruka"></div>
</div>

    <div class="auth-footer">
      Nastavkom prihvataš naše uslove korištenja
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">oglix<span>.ba</span></div>
  <p>© 2026 oglix.ba</p>
</footer>

<script>
function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('loginForma').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForma').style.display = tab === 'register' ? 'block' : 'none';
}

function togglePass(id, el) {
    var inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    el.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function checkStrength(val) {
    var bars = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
    var hint = document.getElementById('sHint');
    bars.forEach(b => b.className = 's-bar');
    if (val.length === 0) { hint.textContent = ''; return; }
    var score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
    var cls = ['weak', 'medium', 'strong'][score - 1] || 'weak';
    var labels = ['Slaba lozinka', 'Srednja lozinka', 'Jaka lozinka'];
    for (var i = 0; i < score; i++) bars[i].classList.add(cls);
    hint.textContent = labels[score - 1] || 'Previše kratka';
    hint.style.color = score === 1 ? '#dc2626' : score === 2 ? '#f59e0b' : '#16a34a';
}

function setLoading(btnId, loading, tekst) {
    var btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading
        ? '<span class="spinner"></span> ' + tekst
        : tekst;
}

function showPoruka(id, tekst, ok) {
    var el = document.getElementById(id);
    el.style.color = ok ? '#16a34a' : '#dc2626';
    el.textContent = tekst;
}

async function login() {
    var email = document.getElementById('loginEmail').value.trim();
    var lozinka = document.getElementById('loginLozinka').value;
    if (!email || !lozinka) { showPoruka('loginPoruka', 'Popunite sva polja!', false); return; }

    setLoading('loginBtn', true, 'Prijavljujem...');

    var res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, lozinka })
    });
    var data = await res.json();

    setLoading('loginBtn', false, 'Prijavi se');

    if (data.uspjeh) {
        localStorage.setItem('korisnik', JSON.stringify(data.korisnik));
        showPoruka('loginPoruka', 'Uspješno! Preusmjeravam...', true);
        setTimeout(() => window.location.href = '/dashboard.html', 1000);
    } else {
        showPoruka('loginPoruka', data.poruka, false);
    }
}

async function register() {
    var ime = document.getElementById('regIme').value.trim();
    var email = document.getElementById('regEmail').value.trim();
    var lozinka = document.getElementById('regLozinka').value;

    if (!ime || !email || !lozinka) { showPoruka('registerPoruka', 'Popunite sva polja!', false); return; }
    if (lozinka.length < 6) { showPoruka('registerPoruka', 'Lozinka mora imati min. 6 karaktera!', false); return; }

    setLoading('regBtn', true, 'Kreiram account...');

    var res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ime, email, lozinka })
    });
    var data = await res.json();

    setLoading('regBtn', false, 'Napravi account');

    if (data.uspjeh) {
        localStorage.setItem('korisnik', JSON.stringify(data.korisnik));
        showPoruka('registerPoruka', 'Account kreiran! Preusmjeravam...', true);
        setTimeout(() => window.location.href = '/dashboard.html', 1000);
    } else {
        showPoruka('registerPoruka', data.poruka, false);
    }
}

document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    var active = document.querySelector('.tab-btn.active').textContent;
    if (active === 'Prijava') login(); else register();
});
</script>
</body>
</html>
